<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Exposure — VayuGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #f8fafc; }
        .log-container { max-width: 600px; margin: 6rem auto 4rem auto; background: #ffffff; border-radius: 24px; padding: 3rem; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08); border: 1px solid rgba(226, 232, 240, 0.8); }
        .log-header { text-align: center; margin-bottom: 2rem; }
        .log-header h2 { font-size: 2rem; color: #1e293b; margin-bottom: 0.5rem; }
        .log-header p { color: #64748b; font-size: 0.95rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 700; color: #475569; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .form-control { width: 100%; padding: 0.8rem 1.2rem; border: 1px solid #cbd5e1; border-radius: 12px; font-family: inherit; font-size: 1rem; color: #1e293b; background: #f8fafc; transition: all 0.3s ease; }
        .form-control:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1); background: #ffffff; }
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 0.5rem; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #475569; cursor: pointer; }
        .submit-btn { width: 100%; padding: 1.2rem; border-radius: 12px; border: none; background: linear-gradient(90deg, #3b82f6, #8b5cf6); color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2); margin-top: 1rem; }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(139, 92, 246, 0.3); }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: #64748b; text-decoration: none; font-weight: 600; font-size: 0.9rem; margin-bottom: 2rem; transition: color 0.2s; }
        .back-link:hover { color: #3b82f6; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand" style="text-decoration: none;">
            <i class="fas fa-shield-virus"></i> VayuGuard
        </a>
    </nav>

    <div class="container">
        <div class="log-container">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            
            <div class="log-header">
                <div style="width: 60px; height: 60px; background: #f3e8ff; color: #8b5cf6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1rem auto;">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <h2>Log AQI Exposure</h2>
                <p>Record your recent exposure to poor air quality to track long-term health patterns.</p>
            </div>

            <form id="exposureForm">
                <div class="form-group">
                    <label>Date & Time of Exposure</label>
                    <input type="datetime-local" class="form-control" required id="expDate">
                </div>

                <div class="form-group">
                    <label>Estimated AQI Range</label>
                    <select class="form-control" required id="expAqi">
                        <option value="" disabled selected>Select the AQI level...</option>
                        <option value="moderate">51 - 100 (Moderate)</option>
                        <option value="sensitive">101 - 150 (Sensitive)</option>
                        <option value="unhealthy">151 - 200 (Unhealthy)</option>
                        <option value="very-unhealthy">201 - 300 (Very Unhealthy)</option>
                        <option value="hazardous">301+ (Hazardous)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Duration of Exposure</label>
                    <select class="form-control" required id="expDuration">
                        <option value="under-15">Under 15 minutes</option>
                        <option value="15-60">15 minutes to 1 hour</option>
                        <option value="1-4-hours">1 to 4 hours</option>
                        <option value="over-4">Over 4 hours</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Symptoms Experienced</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-label"><input type="checkbox" value="cough"> Coughing</label>
                        <label class="checkbox-label"><input type="checkbox" value="wheezing"> Wheezing / Shortness of breath</label>
                        <label class="checkbox-label"><input type="checkbox" value="eyes"> Irritated Eyes</label>
                        <label class="checkbox-label"><input type="checkbox" value="headache"> Headache</label>
                        <label class="checkbox-label"><input type="checkbox" value="fatigue"> Fatigue</label>
                        <label class="checkbox-label"><input type="checkbox" value="none"> No visible symptoms</label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-save"></i> Save Exposure Log
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('exposureForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Here you would normally send this to Firebase!
            // For now, we will show a success alert and go back to the dashboard.
            const btn = document.querySelector('.submit-btn');
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Log Saved Successfully!';
            btn.style.background = '#10b981';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
