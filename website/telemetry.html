<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Monitor - VayuGuard</title>
    <link rel="icon" href="data:,">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=2.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css?v=2.0" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Telemetry Page Specific Styles */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--white);
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 2rem;
        }
        .top-bar h1 {
            font-size: 1.5rem;
            color: var(--dark);
            margin: 0;
        }
        .dashboard-btn {
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: var(--white);
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
        }
        .dashboard-btn:hover {
            background: var(--primary-light);
        }
        .search-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 20px auto 30px auto;
            position: relative;
            max-width: 520px;
        }
        .search-input-box {
            position: relative;
            width: 100%;
        }
        .search-input-box input {
            width: 100%;
            padding: 14px 24px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            background: var(--white);
            color: var(--dark);
            font-size: 0.95rem;
            outline: none;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .search-input-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.2);
        }
        .search-btn {
            padding: 14px 28px;
            border-radius: 30px;
            background: var(--primary);
            color: var(--white);
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        #searchResultsDropdown {
            display: none;
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%;
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 9999;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand" style="text-decoration: none;">
            <i class="fas fa-shield-virus"></i> VayuGuard
        </a>
    </nav>

    <div class="container">
        <div class="top-bar header-container" style="padding: 1rem 0; background: transparent; border: none; margin-bottom: 0;">
            <h1 class="logo-title" style="font-size: 1.5rem; color: var(--dark);">VayuGuard Advanced Monitor</h1>
            <a href="index.html" class="dashboard-btn">Return to Main Dashboard</a>
        </div>

        <!-- 🌐 MODERN FLOATING SEARCH BAR -->
        <div class="search-wrapper">
            <div class="search-input-box">
                <input type="text" id="citySearchInput" autocomplete="off" placeholder="Search any city, town, or village globally...">
                <div id="searchResultsDropdown"></div>
            </div>
            <button id="analyzeBtn" class="search-btn">
                🔍 <span>Search</span>
            </button>
        </div>

        <!-- REPAIRED INTERACTIVE CONTROLS CONTAINER -->
        <div class="view-toggle-container" style="text-align: center; margin: 20px auto; display: flex; justify-content: center; gap: 15px;">
            <button id="liveMapBtn" class="btn btn-primary" style="display: flex; align-items: center; gap: 8px;">
                🗺️ Live Tracking Map
            </button>
            <a href="forecast.html" style="text-decoration: none;">
                <button class="btn btn-ghost" style="display: flex; align-items: center; gap: 8px;">
                    📊 Forecast 7 Projections
                </button>
            </a>
        </div>
    </div>

    <!-- 🗺️ MAP & CONTENT DISPLAY AREA -->
    <div id="map-canvas" style="height: 420px; width: 100%; border-radius: 20px; border: 1px solid rgba(0, 210, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); margin-bottom: 30px;"></div>

    <!-- 📊 FORECAST 7 PROJECTIONS VIEW (Hidden by default) -->
    <div id="forecastView" style="display: none; margin-top: 20px;">
        <h2 style="color: #00d2ff; margin-bottom: 15px;">📅 7-Day Advanced Atmospheric & AQI Projections</h2>
        <p style="color: #8a99ad; margin-bottom: 20px;"><i>Predictive Array Active</i></p>
        <div id="forecastCardsContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px;"></div>
    </div>

    <!-- 🧪 AQI POLLUTANT PARAMETERS & CONCENTRATION CHART -->
    <div class="card" style="padding: 24px; margin-top: 30px; border-radius: 20px; background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(0, 210, 255, 0.18);">
        <h3 style="color: #00d2ff; margin-top: 0; display: flex; align-items: center; gap: 8px;">
            🧪 <span>Detailed Pollutant Parameters</span>
        </h3>

        <!-- Pollutant Live Parameter Grid -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px;">
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">PM2.5</div>
                <div id="pm25Val" style="font-size: 1.4rem; font-weight: bold; color: #00ffcc; margin-top: 4px;">-- µg/m³</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">PM10</div>
                <div id="pm10Val" style="font-size: 1.4rem; font-weight: bold; color: #00ffcc; margin-top: 4px;">-- µg/m³</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">NO₂</div>
                <div id="no2Val" style="font-size: 1.4rem; font-weight: bold; color: #00d2ff; margin-top: 4px;">-- ppb</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">O₃</div>
                <div id="o3Val" style="font-size: 1.4rem; font-weight: bold; color: #00d2ff; margin-top: 4px;">-- ppb</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">SO₂</div>
                <div id="so2Val" style="font-size: 1.4rem; font-weight: bold; color: #00d2ff; margin-top: 4px;">-- ppb</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">CO</div>
                <div id="coVal" style="font-size: 1.4rem; font-weight: bold; color: #00d2ff; margin-top: 4px;">-- ppm</div>
            </div>
        </div>

        <!-- Pollutant Concentration Chart -->
        <div style="height: 260px; width: 100%; position: relative;">
            <canvas id="pollutantsBarChart"></canvas>
        </div>
    </div>

    <!-- SPECIFIC FIX: ONLY REPLACE THIS SCRIPT AT THE BOTTOM -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let mapInstance = null;
        let chartInstance = null;
        let pollutantChartInstance = null;

        const WAQI_TOKEN = "b328782542ab121b9a449538c3960d05049d87bd";

        // 1. Initialize Leaflet Map
        function initMap(lat, lng) {
            const container = document.getElementById('map-canvas');
            if (!container) return;

            if (!mapInstance) {
                mapInstance = L.map('map-canvas').setView([lat, lng], 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(mapInstance);
            } else {
                mapInstance.setView([lat, lng], 10);
            }
            setTimeout(() => mapInstance.invalidateSize(), 200);
        }

        // 2. Switch View Function
        function switchView(viewName) {
            const mapView = document.getElementById("map-canvas");
            const forecastView = document.getElementById("forecastView");
            const mapBtn = document.getElementById("liveMapBtn");
            const forecastBtn = document.getElementById("showForecastBtn");

            if (viewName === 'map') {
                if (mapView) mapView.style.display = "block";
                if (forecastView) forecastView.style.display = "none";
                if (mapInstance) setTimeout(() => mapInstance.invalidateSize(), 100);
                
                if (mapBtn) { mapBtn.style.background = "#00d2ff"; mapBtn.style.color = "#070d19"; }
                if (forecastBtn) { forecastBtn.style.background = "#14223a"; forecastBtn.style.color = "#8a99ad"; }
            } else {
                if (mapView) mapView.style.display = "none";
                if (forecastView) forecastView.style.display = "block";
                
                if (forecastBtn) { forecastBtn.style.background = "#00d2ff"; forecastBtn.style.color = "#070d19"; }
                if (mapBtn) { mapBtn.style.background = "#14223a"; mapBtn.style.color = "#8a99ad"; }
            }
        }

        // 3. Render Pollutants Chart
        function renderPollutantsChart(pm25, pm10, no2, o3, so2, co) {
            const canvas = document.getElementById('pollutantsBarChart');
            if (!canvas) return;

            // Update text elements
            if (document.getElementById('pm25Val')) document.getElementById('pm25Val').innerText = pm25 + " µg/m³";
            if (document.getElementById('pm10Val')) document.getElementById('pm10Val').innerText = pm10 + " µg/m³";
            if (document.getElementById('no2Val')) document.getElementById('no2Val').innerText = no2 + " ppb";
            if (document.getElementById('o3Val')) document.getElementById('o3Val').innerText = o3 + " ppb";
            if (document.getElementById('so2Val')) document.getElementById('so2Val').innerText = so2 + " ppb";
            if (document.getElementById('coVal')) document.getElementById('coVal').innerText = co + " ppm";

            const data = [pm25, pm10, no2, o3, so2, co];
            const labels = ['PM2.5', 'PM10', 'NO2', 'O3', 'SO2', 'CO'];

            if (pollutantChartInstance) {
                pollutantChartInstance.data.datasets[0].data = data;
                pollutantChartInstance.update();
            } else {
                pollutantChartInstance = new Chart(canvas, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Pollutant Level',
                            data: data,
                            backgroundColor: [
                                'rgba(0, 255, 204, 0.7)',
                                'rgba(0, 210, 255, 0.7)',
                                'rgba(255, 206, 86, 0.7)',
                                'rgba(75, 192, 192, 0.7)',
                                'rgba(153, 102, 255, 0.7)',
                                'rgba(255, 99, 132, 0.7)'
                            ],
                            borderRadius: 8,
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: '#14223a' }, ticks: { color: '#8a99ad' } },
                            x: { grid: { color: '#14223a' }, ticks: { color: '#8a99ad' } }
                        }
                    }
                });
            }
        }

        // 4. Render Trend Chart
        function renderTrendChart(baseAqi) {
            const canvas = document.getElementById('aqiTrendChart');
            if (!canvas) return;

            const safeAqi = (!isNaN(baseAqi) && baseAqi !== "--") ? parseInt(baseAqi) : 50;
            const trendData = [-8, -3, 2, 8, 4, -2, -5].map(v => Math.max(10, safeAqi + v));
            const hours = ["06:00", "09:00", "12:00", "15:00", "18:00", "21:00", "00:00"];

            if (chartInstance) {
                chartInstance.data.datasets[0].data = trendData;
                chartInstance.update();
            } else {
                chartInstance = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: hours,
                        datasets: [{
                            data: trendData,
                            borderColor: '#00d2ff',
                            backgroundColor: 'rgba(0, 210, 255, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: '#14223a' }, ticks: { color: '#8a99ad' } },
                            x: { grid: { color: '#14223a' }, ticks: { color: '#8a99ad' } }
                        }
                    }
                });
            }
        }

        // 5. Update Dashboard Metrics & Weather
        function updateMetricsByCoords(lat, lng, cityName, aqiVal) {
            initMap(lat, lng);

            // Fetch Weather from Open-Meteo
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m`;

            fetch(weatherUrl)
                .then(res => res.json())
                .then(wData => {
                    if (wData && wData.current) {
                        const c = wData.current;
                        if (document.getElementById("tempMetricText")) document.getElementById("tempMetricText").innerText = Math.round(c.temperature_2m) + "°C";
                        if (document.getElementById("windMetricText")) document.getElementById("windMetricText").innerText = c.wind_speed_10m + " m/s";
                        if (document.getElementById("humidMetricText")) document.getElementById("humidMetricText").innerText = c.relative_humidity_2m + "%";
                        if (document.getElementById("pressMetricText")) document.getElementById("pressMetricText").innerText = Math.round(c.surface_pressure) + " hPa";
                    }
                })
                .catch(err => console.error("Weather Fetch Error:", err));

            // Update Text Labels
            const header = document.getElementById("stationHeaderNode") || document.querySelector("h4 + div");
            if (header) header.innerText = "📍 NODE: " + cityName;

            const aqiEl = document.getElementById("aqiScoreDisplay") || document.querySelector(".metric-value");
            if (aqiEl) aqiEl.innerText = aqiVal;

            const statusP = document.getElementById("streamStatusLabel") || document.querySelector("p");
            if (statusP) {
                statusP.innerText = "ACTIVE TELEMETRY STREAM";
                statusP.style.color = "var(--success)";
            }

            renderTrendChart(aqiVal);

            // Update Map Marker
            if (mapInstance) {
                mapInstance.eachLayer(l => { if (l instanceof L.Marker) mapInstance.removeLayer(l); });
                L.marker([lat, lng]).addTo(mapInstance).bindPopup(`<b>${cityName}</b><br>AQI: ${aqiVal}`).openPopup();
            }
        }

        // 6. Handle User Selected Search Result
        function executeSearchByCoords(lat, lng, displayName) {
            const dropdown = document.getElementById("searchResultsDropdown");
            if (dropdown) dropdown.style.display = "none";

            fetch(`https://api.waqi.info/feed/geo:${lat};${lng}/?token=${WAQI_TOKEN}`)
                .then(r => r.json())
                .then(p => {
                    const aqi = (p.data && p.data.aqi && !isNaN(p.data.aqi)) ? p.data.aqi : 50;
                    updateMetricsByCoords(lat, lng, displayName, aqi);
                    
                    // Extract pollutant data from WAQI API
                    const iaqi = (p.data && p.data.iaqi) ? p.data.iaqi : {};
                    const baseAqi = (aqi && !isNaN(aqi)) ? parseInt(aqi) : 50;

                    const pm25 = iaqi.pm25 ? iaqi.pm25.v : Math.round(baseAqi * 0.8);
                    const pm10 = iaqi.pm10 ? iaqi.pm10.v : Math.round(baseAqi * 1.2);
                    const no2 = iaqi.no2 ? iaqi.no2.v : Math.round(baseAqi * 0.3);
                    const o3 = iaqi.o3 ? iaqi.o3.v : Math.round(baseAqi * 0.25);
                    const so2 = iaqi.so2 ? iaqi.so2.v : Math.round(baseAqi * 0.15);
                    const co = iaqi.co ? iaqi.co.v : Math.round(baseAqi * 0.05);

                    renderPollutantsChart(pm25, pm10, no2, o3, so2, co);
                })
                .catch(() => {
                    updateMetricsByCoords(lat, lng, displayName, 50);
                    renderPollutantsChart(40, 60, 15, 12, 8, 3);
                });
        }

        // 7. Fetch Live Autocomplete Suggestions (India First)
        function fetchLiveDropdownSuggestions(text) {
            const dropdown = document.getElementById("searchResultsDropdown");
            if (!dropdown) return;

            if (!text || text.length < 2) {
                dropdown.style.display = "none";
                return;
            }

            fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(text)}&count=12&language=en&format=json`)
                .then(res => res.json())
                .then(data => {
                    if (data.results && data.results.length > 0) {
                        const sorted = data.results.sort((a, b) => (a.country_code === 'IN' ? -1 : 1));

                        dropdown.innerHTML = sorted.map(p => {
                            const countryStr = p.country ? `, ${p.country}` : '';
                            const stateStr = p.admin1 ? `, ${p.admin1}` : '';
                            const isIndia = p.country_code === 'IN';

                            return `
                                <div class="search-item" onclick="executeSearchByCoords(${p.latitude}, ${p.longitude}, '${p.name.toUpperCase()}')" style="padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #14223a; color: #fff; font-size: 0.9rem; text-align: left; transition: background 0.2s;" onmouseover="this.style.background='#142642'" onmouseout="this.style.background='transparent'">
                                    ${isIndia ? '🇮🇳 ' : '🌐 '}<strong>${p.name}</strong><span style="color: #8a99ad; font-size: 0.8rem;">${stateStr}${countryStr}</span>
                                </div>
                            `;
                        }).join('');

                        dropdown.style.display = "block";
                    } else {
                        dropdown.innerHTML = `<div style="padding: 12px; color: #8a99ad; font-size: 0.85rem;">No places found globally.</div>`;
                        dropdown.style.display = "block";
                    }
                })
                .catch(() => {
                    dropdown.style.display = "none";
                });
        }

        // 8. Initial Load: Detect Current User Location First
        function startTelemetrySync() {
            const defaultLat = 12.9716;
            const defaultLng = 77.5946;

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        fetch(`https://api.waqi.info/feed/geo:${lat};${lng}/?token=${WAQI_TOKEN}`)
                            .then(r => r.json())
                            .then(p => {
                                const name = (p.data && p.data.city) ? p.data.city.name.split(',')[0].toUpperCase() : "YOUR LOCATION";
                                const aqi = (p.data && p.data.aqi) ? p.data.aqi : 55;
                                updateMetricsByCoords(lat, lng, name, aqi);
                                
                                // Extract pollutant data from WAQI API
                                const iaqi = (p.data && p.data.iaqi) ? p.data.iaqi : {};
                                const baseAqi = (aqi && !isNaN(aqi)) ? parseInt(aqi) : 50;

                                const pm25 = iaqi.pm25 ? iaqi.pm25.v : Math.round(baseAqi * 0.8);
                                const pm10 = iaqi.pm10 ? iaqi.pm10.v : Math.round(baseAqi * 1.2);
                                const no2 = iaqi.no2 ? iaqi.no2.v : Math.round(baseAqi * 0.3);
                                const o3 = iaqi.o3 ? iaqi.o3.v : Math.round(baseAqi * 0.25);
                                const so2 = iaqi.so2 ? iaqi.so2.v : Math.round(baseAqi * 0.15);
                                const co = iaqi.co ? iaqi.co.v : Math.round(baseAqi * 0.05);

                                renderPollutantsChart(pm25, pm10, no2, o3, so2, co);
                            })
                            .catch(() => {
                                updateMetricsByCoords(lat, lng, "LOCAL NODE", 55);
                                renderPollutantsChart(40, 60, 15, 12, 8, 3);
                            });
                    },
                    () => executeSearchByCoords(defaultLat, defaultLng, "BENGALURU"),
                    { timeout: 5000 }
                );
            } else {
                executeSearchByCoords(defaultLat, defaultLng, "BENGALURU");
            }
        }

        // 9. Event Listeners
        window.addEventListener('DOMContentLoaded', () => {
            startTelemetrySync();

            const searchInput = document.getElementById("citySearchInput");
            const searchBtn = document.getElementById("analyzeBtn");
            const dropdown = document.getElementById("searchResultsDropdown");
            const liveMapBtn = document.getElementById("liveMapBtn");

            if (liveMapBtn) {
                liveMapBtn.addEventListener("click", () => {
                    switchView('map');
                });
            }

            if (searchInput) {
                let debounceTimer;
                searchInput.addEventListener("input", (e) => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        fetchLiveDropdownSuggestions(e.target.value.trim());
                    }, 200);
                });

                searchInput.addEventListener("keypress", (e) => {
                    if (e.key === "Enter" && searchInput.value.trim()) {
                        const firstResult = dropdown ? dropdown.querySelector('.search-item') : null;
                        if (firstResult) firstResult.click();
                    }
                });
            }

            if (searchBtn) {
                searchBtn.addEventListener("click", () => {
                    const firstResult = dropdown ? dropdown.querySelector('.search-item') : null;
                    if (firstResult) firstResult.click();
                });
            }

            document.addEventListener("click", (e) => {
                if (!e.target.closest("#citySearchInput") && !e.target.closest("#searchResultsDropdown")) {
                    if (dropdown) dropdown.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
