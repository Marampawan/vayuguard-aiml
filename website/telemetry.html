<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Monitor - VayuGuard</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo="> <!-- Silences missing favicon 404 -->
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=2.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css?v=2.0" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Telemetry Page Specific Styles */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--white);
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 2rem;
        }
        .top-bar h1 {
            font-size: 1.5rem;
            color: var(--dark);
            margin: 0;
        }
        .dashboard-btn {
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: var(--white);
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
        }
        .dashboard-btn:hover {
            background: var(--primary-light);
        }
        .search-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 20px auto 30px auto;
            position: relative;
            max-width: 520px;
        }
        .search-input-box {
            position: relative;
            width: 100%;
        }
        .search-input-box input {
            width: 100%;
            padding: 14px 24px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            background: var(--white);
            color: var(--dark);
            font-size: 0.95rem;
            outline: none;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .search-input-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.2);
        }
        .search-btn {
            padding: 14px 28px;
            border-radius: 30px;
            background: var(--primary);
            color: var(--white);
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        #searchResultsDropdown {
            display: none;
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%;
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 9999;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand" style="text-decoration: none;">
            <i class="fas fa-shield-virus"></i> VayuGuard
        </a>
    </nav>

    <div class="container">
        <div class="top-bar header-container" style="padding: 1rem 0; background: transparent; border: none; margin-bottom: 0;">
            <h1 class="logo-title" style="font-size: 1.5rem; color: var(--dark);">VayuGuard Advanced Monitor</h1>
            <a href="index.html" class="dashboard-btn">Return to Main Dashboard</a>
        </div>

        <!-- 🔙 RETURN TO DASHBOARD BUTTON -->
        <div style="margin: 20px 0; text-align: left;">
            <a href="index.html" style="
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 10px 20px;
                background: linear-gradient(135deg, #00d2ff, #3a7bd5);
                color: #ffffff;
                font-weight: bold;
                font-size: 0.95rem;
                text-decoration: none;
                border-radius: 12px;
                box-shadow: 0 4px 12px rgba(0, 210, 255, 0.3);
                transition: transform 0.2s ease, box-shadow 0.2s ease;
            ">
                ⬅️ Return to Main Dashboard
            </a>
        </div>

        <!-- 🌐 MODERN FLOATING SEARCH BAR -->
        <div class="search-wrapper">
            <div class="search-input-box">
                <input type="text" id="citySearchInput" autocomplete="off" placeholder="Search any city, town, or village globally...">
                <div id="searchResultsDropdown"></div>
            </div>
            <button id="analyzeBtn" class="search-btn">
                🔍 <span>Search</span>
            </button>
        </div>

        <!-- REPAIRED INTERACTIVE CONTROLS CONTAINER -->
        <div class="view-toggle-container" style="text-align: center; margin: 20px auto; display: flex; justify-content: center; gap: 15px;">
            <button id="liveMapBtn" class="btn btn-primary" style="display: flex; align-items: center; gap: 8px;">
                🗺️ Live Tracking Map
            </button>
            <a href="forecast.html" style="text-decoration: none;">
                <button class="btn btn-ghost" style="display: flex; align-items: center; gap: 8px;">
                    📊 Forecast 7 Projections
                </button>
            </a>
        </div>
    </div>

    <!-- 🗺️ MAP & CONTENT DISPLAY AREA -->
    <div id="map" style="height: 420px; width: 100%; border-radius: 20px; border: 1px solid rgba(0, 210, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); margin-bottom: 30px;"></div>

    <!-- 📊 FORECAST 7 PROJECTIONS VIEW (Hidden by default) -->
    <div id="forecastView" style="display: none; margin-top: 20px;">
        <h2 style="color: #00d2ff; margin-bottom: 15px;">📅 7-Day Advanced Atmospheric & AQI Projections</h2>
        <p style="color: #8a99ad; margin-bottom: 20px;"><i>Predictive Array Active</i></p>
        <div id="forecastCardsContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px;"></div>
    </div>

    <!-- 🧪 AQI POLLUTANT PARAMETERS & CONCENTRATION CHART -->
    <div class="card" style="padding: 24px; margin-top: 30px; border-radius: 20px; background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(0, 210, 255, 0.18);">
        <h3 style="color: #00d2ff; margin-top: 0; display: flex; align-items: center; gap: 8px;">
            🧪 <span>Detailed Pollutant Parameters</span>
        </h3>

        <!-- Pollutant Live Parameter Grid -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px;">
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">PM2.5</div>
                <div id="pm25Val" style="font-size: 1.4rem; font-weight: bold; color: #00ffcc; margin-top: 4px;">-- µg/m³</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">PM10</div>
                <div id="pm10Val" style="font-size: 1.4rem; font-weight: bold; color: #00ffcc; margin-top: 4px;">-- µg/m³</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">NO₂</div>
                <div id="no2Val" style="font-size: 1.4rem; font-weight: bold; color: #00d2ff; margin-top: 4px;">-- ppb</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">O₃</div>
                <div id="o3Val" style="font-size: 1.4rem; font-weight: bold; color: #00d2ff; margin-top: 4px;">-- ppb</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">SO₂</div>
                <div id="so2Val" style="font-size: 1.4rem; font-weight: bold; color: #00d2ff; margin-top: 4px;">-- ppb</div>
            </div>
            <div style="background: rgba(20, 34, 58, 0.6); padding: 15px; border-radius: 14px; border: 1px solid rgba(0, 210, 255, 0.1); text-align: center;">
                <div style="font-size: 0.8rem; color: #8a99ad;">CO</div>
                <div id="coVal" style="font-size: 1.4rem; font-weight: bold; color: #00d2ff; margin-top: 4px;">-- ppm</div>
            </div>
        </div>

        <!-- Pollutant Concentration Chart -->
        <div style="height: 260px; width: 100%; position: relative;">
            <canvas id="pollutantsBarChart"></canvas>
        </div>
    </div>

    <!-- Open-Meteo Air Quality API Script -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    let map, marker, forecastChart;

    // 🏙️ Initialize Leaflet Map
    function initMap(lat = 12.9716, lng = 77.5946, locationName = "Bengaluru") {
        if (!map) {
            map = L.map('map').setView([lat, lng], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        } else {
            map.setView([lat, lng], 10);
        }

        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lng]).addTo(map);
        
        // Fetch real-time data for initial/searched location
        loadTelemetryData(lat, lng, locationName);
    }

    // 🌐 Fetch Live AQI, Pollutants & 7-Day Forecast from Open-Meteo
    function loadTelemetryData(lat, lng, locationName) {
        // A. Fetch Current Air Quality & Pollutant Breakdown
        fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lng}&current=us_aqi,pm2_5,pm10,nitrogen_dioxide,ozone,sulphur_dioxide,carbon_monoxide&hourly=us_aqi`)
            .then(res => res.json())
            .then(data => {
                const cur = data.current || {};
                const liveAqi = typeof cur.us_aqi === 'number' ? cur.us_aqi : Math.round((cur.pm2_5 || 20) * 2.1);

                // 1. Update Map Marker Popup Dynamically
                if (marker) {
                    marker.bindPopup(`<b>${locationName.toUpperCase()}</b><br>LIVE AQI: ${liveAqi}`).openPopup();
                }

                // 2. Update Detailed Pollutant Parameters Grid
                updateElementText("pm25Val", `${cur.pm2_5 ? Math.round(cur.pm2_5) : '--'} µg/m³`);
                updateElementText("pm10Val", `${cur.pm10 ? Math.round(cur.pm10) : '--'} µg/m³`);
                updateElementText("no2Val", `${cur.nitrogen_dioxide ? Math.round(cur.nitrogen_dioxide) : '--'} ppb`);
                updateElementText("o3Val", `${cur.ozone ? Math.round(cur.ozone) : '--'} ppb`);
                updateElementText("so2Val", `${cur.sulphur_dioxide ? Math.round(cur.sulphur_dioxide) : '--'} ppb`);
                updateElementText("coVal", `${cur.carbon_monoxide ? (cur.carbon_monoxide / 100).toFixed(1) : '--'} ppm`);

                // 3. Render 7-Day Projections Chart
                if (data.hourly && data.hourly.us_aqi) {
                    renderForecastChart(data.hourly.time, data.hourly.us_aqi);
                }
            })
            .catch(err => console.error("Error loading telemetry:", err));
    }

    // Helper: Update Text safely
    function updateElementText(id, text) {
        const el = document.getElementById(id);
        if (el) el.innerText = text;
    }

    // 📊 Render 7-Day Forecast Chart using Chart.js
    function renderForecastChart(timeArray, aqiArray) {
        const ctx = document.getElementById('pollutantsBarChart');
        if (!ctx) return;

        // Take 7 daily snapshot values (every 24 hours)
        const dailyLabels = [];
        const dailyData = [];
        for (let i = 0; i < timeArray.length; i += 24) {
            const date = new Date(timeArray[i]);
            dailyLabels.push(date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }));
            dailyData.push(aqiArray[i] || 50);
        }

        if (forecastChart) forecastChart.destroy();

        forecastChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dailyLabels,
                datasets: [{
                    label: '7-Day Projected AQI',
                    data: dailyData,
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.15)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#ffffff' } } },
                scales: {
                    x: { ticks: { color: '#8a99ad' } },
                    y: { ticks: { color: '#8a99ad' }, beginAtZero: true }
                }
            }
        });
    }

    // 📍 Event Handler & Search Setup
    document.addEventListener("DOMContentLoaded", function() {
        initMap(12.9716, 77.5946, "Bengaluru");

        // Handle Search Bar Input
        const searchBtn = document.querySelector("button") || document.getElementById("searchBtn");
        const searchInput = document.querySelector("input[type='text']") || document.getElementById("searchInput");

        if (searchBtn && searchInput) {
            searchBtn.addEventListener("click", () => {
                const query = searchInput.value.trim();
                if (!query) return;

                fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1`)
                    .then(res => res.json())
                    .then(geoData => {
                        if (geoData.results && geoData.results.length > 0) {
                            const res = geoData.results[0];
                            initMap(res.latitude, res.longitude, res.name);
                        }
                    });
            });
        }
    });
    </script>
</body>
</html>
