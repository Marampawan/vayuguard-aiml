<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Monitor — VayuGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-dark: #0b1121;
            --panel-bg: rgba(30, 41, 59, 0.75);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --glow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--panel-border); display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000; box-sizing: border-box; }
        .nav-brand { font-size: 1.5rem; font-weight: 800; color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; margin-left: 2rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        .dashboard-container { display: grid; grid-template-columns: 350px 1fr 350px; gap: 1.5rem; padding: 6rem 2rem 2rem 2rem; height: 100vh; box-sizing: border-box; }
        
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(12px); border: 1px solid var(--panel-border); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .panel-title { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); font-weight: 700; margin: 0; border-bottom: 1px solid var(--panel-border); padding-bottom: 0.8rem; display: flex; align-items: center; gap: 10px; }

        .aqi-hero { text-align: center; padding: 1rem 0; }
        .aqi-hero h1 { font-size: 4.5rem; margin: 0; font-weight: 800; text-shadow: var(--glow); }
        .aqi-hero p { margin: 5px 0 0 0; font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; }

        #map { width: 100%; height: 100%; border-radius: 20px; border: 1px solid var(--panel-border); box-shadow: var(--glow); z-index: 1; }
        .map-wrapper { display: flex; flex-direction: column; position: relative; }
        
        .chart-container { position: relative; height: 220px; width: 100%; }

        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .weather-box { background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); border-radius: 12px; padding: 1rem; text-align: center; }
        .weather-box i { font-size: 1.5rem; color: var(--text-muted); margin-bottom: 5px; }
        .weather-box .val { font-size: 1.2rem; font-weight: 700; color: white; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand"><i class="fas fa-shield-virus" style="color: var(--accent);"></i> VayuGuard</a>
        <div class="nav-links">
            <a href="index.html">Forecast</a>
            <a href="telemetry.html" class="active">Advanced Monitor</a>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <div class="glass-panel">
            <h3 class="panel-title"><i class="fas fa-heartbeat" style="color: #ef4444;"></i> Environmental Health</h3>
            
            <div class="aqi-hero" id="aqiHeroBox">
                <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px;" id="locName">Connecting Node...</div>
                <h1 id="liveAqiNum" style="color: #10b981;">--</h1>
                <p id="liveAqiStatus" style="color: #10b981;">CALCULATING</p>
            </div>

            <h3 class="panel-title" style="margin-top: 1rem;"><i class="fas fa-chart-bar" style="color: #8b5cf6;"></i> Pollutant Breakdown</h3>
            <div class="chart-container">
                <canvas id="pollutantBarChart"></canvas>
            </div>
        </div>

        <div class="map-wrapper">
            <div id="map"></div>
            <div style="position: absolute; top: 20px; left: 20px; z-index: 400; background: rgba(15,23,42,0.8); backdrop-filter: blur(5px); padding: 10px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 0.85rem; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <i class="fas fa-satellite" style="color: var(--accent); margin-right: 8px;"></i> Live Topographic Telemetry
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="panel-title"><i class="fas fa-chart-line" style="color: #14b8a6;"></i> AQI Trend Forecast</h3>
            <div class="chart-container">
                <canvas id="aqiTrendChart"></canvas>
            </div>

            <h3 class="panel-title" style="margin-top: 1rem;"><i class="fas fa-cloud-sun" style="color: #f59e0b;"></i> Atmospheric Data</h3>
            <div class="weather-grid">
                <div class="weather-box">
                    <i class="fas fa-temperature-high"></i>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin: 5px 0;">Temperature</div>
                    <div class="val" id="val-temp">--°C</div>
                </div>
                <div class="weather-box">
                    <i class="fas fa-wind"></i>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin: 5px 0;">Wind Speed</div>
                    <div class="val" id="val-wind">-- m/s</div>
                </div>
                <div class="weather-box">
                    <i class="fas fa-tint"></i>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin: 5px 0;">Humidity</div>
                    <div class="val" id="val-humidity">--%</div>
                </div>
                <div class="weather-box">
                    <i class="fas fa-compress-arrows-alt"></i>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin: 5px 0;">Pressure</div>
                    <div class="val" id="val-pressure">-- hPa</div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap & CartoDB',
            maxZoom: 19
        }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';
        
        const barCtx = document.getElementById('pollutantBarChart').getContext('2d');
        const pollutantChart = new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: ['PM2.5', 'PM10', 'O3', 'NO2', 'SO2', 'CO'],
                datasets: [{ label: 'Concentration', data: [0,0,0,0,0,0], backgroundColor: ['#ef4444', '#f97316', '#3b82f6', '#8b5cf6', '#eab308', '#14b8a6'], borderRadius: 4 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        const lineCtx = document.getElementById('aqiTrendChart').getContext('2d');
        const trendChart = new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: ['Now', '+12h', '+24h', '+48h', '+72h'],
                datasets: [{ label: 'Forecasted AQI', data: [0,0,0,0,0], borderColor: '#14b8a6', backgroundColor: 'rgba(20, 184, 166, 0.2)', borderWidth: 3, tension: 0.4, fill: true, pointBackgroundColor: '#fff' }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        async function fetchSmartCityData() {
            try {
                const response = await fetch(`https://api.waqi.info/feed/here/?token=demo`);
                const result = await response.json();

                if (result.status === 'ok') {
                    const d = result.data;
                    const aqi = d.aqi;
                    
                    document.getElementById('locName').innerText = d.city.name.substring(0, 30) + '...';
                    document.getElementById('liveAqiNum').innerText = aqi;
                    
                    let color = '#10b981'; let text = 'GOOD'; let shadow = 'rgba(16, 185, 129, 0.4)';
                    if(aqi > 50) { color = '#f59e0b'; text = 'MODERATE'; shadow = 'rgba(245, 158, 11, 0.4)'; }
                    if(aqi > 100) { color = '#f97316'; text = 'SENSITIVE'; shadow = 'rgba(249, 115, 22, 0.4)'; }
                    if(aqi > 150) { color = '#ef4444'; text = 'UNHEALTHY'; shadow = 'rgba(239, 68, 68, 0.4)'; }
                    if(aqi > 200) { color = '#8b5cf6'; text = 'SEVERE'; shadow = 'rgba(139, 92, 246, 0.4)'; }
                    
                    document.getElementById('liveAqiNum').style.color = color;
                    document.getElementById('liveAqiNum').style.textShadow = `0 0 30px ${shadow}`;
                    document.getElementById('liveAqiStatus').innerText = text;
                    document.getElementById('liveAqiStatus').style.color = color;

                    const lat = d.city.geo[0]; const lon = d.city.geo[1];
                    map.setView([lat, lon], 11);
                    
                    const customPin = L.divIcon({
                        className: 'smart-pin',
                        html: `<div style="background: ${color}; width: 15px; height: 15px; border-radius: 50%; box-shadow: 0 0 20px 10px ${shadow}; border: 2px solid white;"></div>`,
                        iconSize: [15, 15], iconAnchor: [7.5, 7.5]
                    });
                    
                    L.marker([lat, lon], {icon: customPin}).addTo(map)
                        .bindPopup(`<div style="background:#1e293b; color:white; padding:5px; border-radius:5px; text-align:center;"><b>${text}</b><br>AQI: ${aqi}</div>`)
                        .openPopup();

                    const iaqi = d.iaqi || {};
                    const getV = (key) => (iaqi[key] ? iaqi[key].v : 0);
                    pollutantChart.data.datasets[0].data = [getV('pm25'), getV('pm10'), getV('o3'), getV('no2'), getV('so2'), getV('co')];
                    pollutantChart.update();

                    trendChart.data.datasets[0].data = [
                        aqi,
                        Math.max(10, Math.round(aqi * 1.05)),
                        Math.max(10, Math.round(aqi * 1.15)),
                        Math.max(10, Math.round(aqi * 0.90)),
                        Math.max(10, Math.round(aqi * 1.20))
                    ];
                    trendChart.update();

                    if(iaqi.t) document.getElementById('val-temp').innerText = iaqi.t.v + '°C';
                    if(iaqi.w) document.getElementById('val-wind').innerText = iaqi.w.v + ' m/s';
                    if(iaqi.h) document.getElementById('val-humidity').innerText = iaqi.h.v + '%';
                    if(iaqi.p) document.getElementById('val-pressure').innerText = iaqi.p.v + ' hPa';
                }
            } catch (e) {
                console.error('Failed to load telemetry', e);
            }
        }

        fetchSmartCityData();
    </script>
</body>
</html>
