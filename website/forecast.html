<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Day Forecast & Mindful Hub — VayuGuard</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo="> <!-- Silences missing favicon 404 -->
    <style>
        /* 🌌 Lighter Glassmorphism & Neon-Border Theme */
        :root {
            --bg-light-dark: #121c33; /* Lighter background tone */
            --card-bg: rgba(26, 38, 66, 0.75); /* Lighter card background */
            --card-border: rgba(0, 210, 255, 0.45); /* Enhanced vibrant border */
            --accent-glow: #00d2ff;
            --text-main: #f8fafc;
            --text-sub: #cbd5e1;
        }

        body {
            background-color: var(--bg-light-dark);
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(0, 210, 255, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(0, 255, 204, 0.12) 0%, transparent 45%);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 24px;
            min-height: 100vh;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-btn {
            padding: 10px 20px;
            border-radius: 20px;
            background: rgba(26, 38, 66, 0.85);
            border: 1px solid var(--card-border);
            color: var(--accent-glow);
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.15);
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: var(--accent-glow);
            color: #080d1a;
            box-shadow: 0 0 18px rgba(0, 210, 255, 0.5);
        }

        /* 📅 Forecast Cards Grid */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .forecast-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border); /* Enhanced bright border */
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(0, 210, 255, 0.05); /* Outer + Inner glow */
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            border-color: #00ffcc;
            box-shadow: 0 12px 30px rgba(0, 210, 255, 0.35), inset 0 0 15px rgba(0, 255, 204, 0.1);
        }

        .forecast-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
            padding-bottom: 12px;
            margin-bottom: 14px;
        }

        .astro-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-sub);
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 210, 255, 0.2); /* Enhanced inner card border */
        }

        .astro-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 🧘 Mindful Joke Box */
        .joke-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 26px;
            backdrop-filter: blur(16px);
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        .joke-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 12px;
            background: rgba(0, 210, 255, 0.2);
            border: 1px solid rgba(0, 210, 255, 0.4);
            color: var(--accent-glow);
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .refresh-joke-btn {
            margin-top: 16px;
            padding: 10px 24px;
            border-radius: 20px;
            background: linear-gradient(135deg, #00d2ff 0%, #0072ff 100%);
            border: none;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .refresh-joke-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- 🌐 HEADER & LOCATION SELECTOR -->
    <div style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px;">
        <h2 style="color: #00d2ff; margin: 0; font-size: 1.6rem; display: flex; align-items: center; gap: 10px;">
            📅 Detailed 7-Day Atmospheric & Astronomical Projections
        </h2>

        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="forecastLocationSelect" style="color: #8a99ad; font-weight: bold; font-size: 0.9rem;">LOCATION:</label>
            <select id="forecastLocationSelect" style="
                padding: 8px 16px; 
                border-radius: 10px; 
                background: rgba(15,23,42,0.9); 
                color: #00d2ff; 
                border: 1px solid rgba(0,210,255,0.4); 
                font-weight: bold; 
                cursor: pointer;
                outline: none;">
                <option value="bengaluru">Bengaluru, IN</option>
                <option value="delhi">Delhi, IN</option>
                <option value="newyork">New York, US</option>
            </select>
        </div>
    </div>

    <!-- 📦 CONTAINER FOR DYNAMICALLY RENDERED 7-DAY CARDS -->
    <div id="forecastCardsContainer" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-between;">
        <!-- Live dynamic cards will render here -->
    </div>

    <!-- 🧘 RANDOM MINDFUL JOKE BOX -->
    <div class="joke-card">
        <div id="jokeCategory" class="joke-badge">DAILY HUMOR</div>
        <div id="jokeText" style="font-size: 1.15rem; color: #fff; min-height: 50px; display: flex; align-items: center; justify-content: center; font-style: italic;">
            "Loading your mindful joke..."
        </div>
        <button onclick="displayRandomJoke()" class="refresh-joke-btn">🎲 Another Mindful Joke</button>
    </div>

    <script>
        // 1. Array of Mindful & Tech Jokes
        const jokesList = [
            { cat: "Classic", text: "Why did the tomato blush? Because it saw the salad dressing!" },
            { cat: "Random", text: "Why can't a bicycle stand up by itself? Because it's two-tired!" },
            { cat: "Dad Joke", text: "What do you call a bear with no teeth? A gummy bear!" },
            { cat: "Atmosphere", text: "Why does a coordinates node love dark clouds? Because they keep it fully calibrated under pressure!" },
            { cat: "Geek Logic", text: "Why did the AI go cross-eyed? Too many input parameters to process!" },
            { cat: "Classic", text: "Why did the egg hide? Because it was a little chicken!" },
            { cat: "Tech", text: "There are 10 types of people in the world: those who understand binary, and those who don't." },
            { cat: "Weather", text: "What does a cloud wear under its raincoat? Thunderwear!" }
        ];

        // Function to select and render a random joke
        function displayRandomJoke() {
            const randomIndex = Math.floor(Math.random() * jokesList.length);
            const selected = jokesList[randomIndex];
            document.getElementById("jokeCategory").innerText = selected.cat;
            document.getElementById("jokeText").innerText = `"${selected.text}"`;
        }

        // 🏙️ City Mapping Table
        const cityCoordinates = {
            "bengaluru": { name: "BENGALURU, IN", lat: 12.9716, lng: 77.5946 },
            "delhi":     { name: "DELHI, IN", lat: 28.6139, lng: 77.2090 },
            "newyork":   { name: "NEW YORK, US", lat: 40.7128, lng: -74.0060 }
        };

        // 🌐 Live 7-Day Forecast Fetch Pipeline
        function loadLive7DayForecast(cityKey) {
            const key = (cityKey || "bengaluru").toLowerCase();
            const city = cityCoordinates[key] || cityCoordinates["bengaluru"];
            const container = document.getElementById("forecastCardsContainer");

            if (!container) return;
            container.innerHTML = `<div style="color:#00d2ff; font-size:1.1rem; padding:20px; width:100%; text-align:center;">Fetching live 7-day projections for ${city.name}...</div>`;

            const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lng}&daily=temperature_2m_max,temperature_2m_min,wind_speed_10m_max,relative_humidity_2m_mean,sunrise,sunset&timezone=auto`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (!data.daily || !data.daily.time) return;

                    const daily = data.daily;
                    let htmlContent = "";

                    for (let i = 0; i < daily.time.length; i++) {
                        const dateObj = new Date(daily.time[i] + "T00:00:00");
                        const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

                        const maxTemp = Math.round(daily.temperature_2m_max[i]);
                        const minTemp = Math.round(daily.temperature_2m_min[i]);
                        const wind = (daily.wind_speed_10m_max[i] || 15).toFixed(1);
                        const humidity = Math.round(daily.relative_humidity_2m_mean[i] || 65);

                        const sunrise = daily.sunrise[i] ? daily.sunrise[i].split("T")[1].substring(0, 5) : "06:00";
                        const sunset = daily.sunset[i] ? daily.sunset[i].split("T")[1].substring(0, 5) : "18:48";

                        htmlContent += `
                            <div style="flex: 1 1 300px; max-width: 380px; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 16px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                    <span style="color: #00d2ff; font-weight: bold; font-size: 1.1rem;">${dateStr}</span>
                                    <span style="font-size: 1.5rem;">⛅</span>
                                </div>

                                <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 15px;">
                                    <div>
                                        <span style="font-size: 2.2rem; font-weight: bold; color: #ffffff;">${maxTemp}°C</span>
                                        <span style="color: #8a99ad; font-size: 1rem;"> / ${minTemp}°C</span>
                                    </div>
                                    <div style="text-align: right; color: #00ffcc; font-size: 0.85rem; font-weight: bold;">
                                        💨 ${wind} km/h<br>
                                        💧 ${humidity}% Hum
                                    </div>
                                </div>

                                <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 12px 0;">

                                <div style="display: flex; justify-content: space-between; color: #8a99ad; font-size: 0.85rem;">
                                    <span>🌅 Up: <strong style="color: #ffffff;">${sunrise}</strong></span>
                                    <span>🌇 Set: <strong style="color: #ffffff;">${sunset}</strong></span>
                                </div>
                            </div>
                        `;
                    }

                    container.innerHTML = htmlContent;
                })
                .catch(err => {
                    console.error("Error fetching forecast:", err);
                    container.innerHTML = `<div style="color:#ff6666; padding:20px; width:100%; text-align:center;">Unable to load live forecast data.</div>`;
                });
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            displayRandomJoke();
            
            // Load default forecast for Bengaluru
            loadLive7DayForecast("bengaluru");

            // Add event listener for location dropdown
            const locationSelect = document.getElementById("forecastLocationSelect");
            if (locationSelect) {
                locationSelect.addEventListener("change", (e) => {
                    loadLive7DayForecast(e.target.value);
                });
            }
        });
    </script>
</body>
</html>
